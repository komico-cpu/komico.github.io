<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>動畫作品 | Komico Portfolio</title>
<style>
body{
    font-family:"Microsoft JhengHei", sans-serif;
    max-width:1000px;
    margin:0 auto;
    padding:20px;
    background:#f7f7f7;
}
.back{
    margin-bottom:30px;
}
.back a{
    color:#0066cc;
    text-decoration:none;
}
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
.gallery img, .gallery video{
    width:100%;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
</style>
</head>
<body>
    <h1>動畫作品</h1>
    <p class="back"><a href=" ">← 返回首頁</a ></p >
    <div class="gallery">
        <!-- MP4 短片，自動播放、循環、靜音 -->
        <video autoplay loop muted playsinline>
            <source src="short_ani.mp4" type="video/mp4">
            瀏覽器不支援影片播放
        </video>
        <!-- GIF 動圖，寫法和一般圖片完全一樣 -->
        < img src="ani_gif1.gif" alt="逐格動畫">
        <!-- 普通靜態截圖 -->
        < img src="ani2.jpg" alt="動畫截圖">
    </div>
</body>
</html>
